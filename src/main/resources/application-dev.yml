spring:
  datasource:
    url: jdbc:h2:mem:metahub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false
  elasticsearch:
    uris: http://localhost:9200
  data:
    elasticsearch:
      repositories:
        enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:data-dev.sql

metahub:
  search:
    engine: jpa    # fallback to JPA LIKE queries in dev

# Concise logging for dev
logging:
  level:
    com.metahub: INFO
    com.metahub.logging: INFO

