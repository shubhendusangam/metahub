# ─────────────────────────────────────────────────────────────────────────────
# Docker profile — extends prod with auto-DDL for fresh databases
# Usage: SPRING_PROFILES_ACTIVE=docker
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:metahub}
    username: ${DB_USER:metahub}
    password: ${DB_PASSWORD:metahub}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: ${ES_URIS:http://elasticsearch:9200}
  data:
    elasticsearch:
      repositories:
        enabled: true

metahub:
  search:
    engine: elasticsearch

logging:
  level:
    com.metahub: INFO
    org.springframework.data.elasticsearch: WARN

