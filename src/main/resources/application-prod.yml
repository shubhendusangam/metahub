spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:metahub}
    username: ${DB_USER:metahub}
    password: ${DB_PASSWORD:metahub}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  data:
    elasticsearch:
      repositories:
        enabled: true

metahub:
  search:
    engine: elasticsearch

